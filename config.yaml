environment:
  max_steps: 5
  time_limit_seconds: 30
  difficulty_sampling: [0.33, 0.33, 0.34]  # Easy, Medium, Hard

llm:
  provider: "openai"  # Options: "openai", "mock"
  model: "gpt-4-turbo"
  temperature: 0.7
  max_tokens: 500
  timeout: 10
  retry_attempts: 2

grading:
  semantic_weight: 0.4
  format_weight: 0.35
  efficiency_weight: 0.25
  use_embeddings: false

logging:
  level: "INFO"
  log_file: "logs/promptgym.log"
